<!-- Partial: status badge + action buttons for detail page HTMX swaps -->
<div id="detail-status" class="flex flex-wrap items-center gap-3">

    <span class="inline-flex items-center rounded-full px-3 py-1 text-sm font-medium
        {% if payment.status == 'draft' %}bg-gray-100 text-gray-700
        {% elif payment.status == 'pending_pcm' %}bg-yellow-100 text-yellow-800
        {% elif payment.status == 'pending_final' %}bg-blue-100 text-blue-800
        {% elif payment.status == 'approved' %}bg-green-100 text-green-800
        {% elif payment.status == 'rejected' %}bg-red-100 text-red-800
        {% else %}bg-gray-100 text-gray-700{% endif %}">
        {{ payment.get_status_display }}
    </span>

    {% if payment.is_draft and payment.requester == request.user %}
    <form method="post" action="{% url 'payments:submit' pk=payment.pk %}"
          hx-post="{% url 'payments:submit' pk=payment.pk %}"
          hx-target="#detail-status"
          hx-swap="outerHTML">
        {% csrf_token %}
        <button type="submit"
                class="rounded-lg bg-brand-600 px-3 py-1.5 text-sm font-medium text-white hover:bg-brand-700 transition-colors">
            Submit for Approval
        </button>
    </form>
    {% endif %}

</div>
