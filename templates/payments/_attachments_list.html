<!-- Partial: attachments list for HTMX refresh after upload -->
<div id="attachments-list" class="space-y-2">
    {% for attachment in attachments %}
    <div class="flex items-center justify-between rounded-lg border border-gray-200 bg-gray-50 px-4 py-2 text-sm">
        <div class="flex items-center gap-2 min-w-0">
            <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M18.375 12.739l-7.693 7.693a4.5 4.5 0 01-6.364-6.364l10.94-10.94A3 3 0 1119.5 7.372L8.552 18.32m.009-.01l-.01.01m5.699-9.941l-7.81 7.81a1.5 1.5 0 002.112 2.13" />
            </svg>
            <a href="{{ attachment.file.url }}" target="_blank" class="truncate font-medium text-brand-600 hover:underline">
                {{ attachment.original_filename }}
            </a>
            <span class="text-gray-400 text-xs flex-shrink-0">{{ attachment.get_file_type_display }}</span>
        </div>
        <span class="text-gray-400 text-xs flex-shrink-0 ml-2">
            {{ attachment.created_at|date:"d M Y" }}
        </span>
    </div>
    {% empty %}
    <p class="text-sm text-gray-400 py-2">No attachments yet.</p>
    {% endfor %}
</div>
