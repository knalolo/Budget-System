{% load procurement_tags %}
{# Context: purchase_request, can_approve #}
{% if can_approve %}
<div x-data="{ showApprove: false, showReject: false, submittingAction: '' }">

    {# Action buttons #}
    <div class="flex gap-3">
        <button
            @click="showApprove = true; showReject = false"
            :disabled="submittingAction !== ''"
            class="inline-flex items-center gap-2 rounded-md bg-green-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-green-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-green-600 transition-colors"
            :class="submittingAction !== '' ? 'cursor-not-allowed opacity-60' : ''"
        >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
            Approve
        </button>
        <button
            @click="showReject = true; showApprove = false"
            :disabled="submittingAction !== ''"
            class="inline-flex items-center gap-2 rounded-md bg-red-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-red-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-red-600 transition-colors"
            :class="submittingAction !== '' ? 'cursor-not-allowed opacity-60' : ''"
        >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
            Reject
        </button>
    </div>

    {# Approve comment panel #}
    <div x-show="showApprove" x-transition class="mt-4 rounded-lg border border-green-200 bg-green-50 p-4">
        <h4 class="text-sm font-semibold text-green-800 mb-2">Confirm Approval</h4>
        <form
            method="post"
            action="{% url 'orders:purchase-request-approve' purchase_request.pk %}"
            @submit="submittingAction = 'approve'"
        >
            {% csrf_token %}
            <div class="mb-3">
                <label class="block text-sm font-medium text-green-700 mb-1">Comment (optional)</label>
                <textarea
                    name="comment"
                    rows="3"
                    placeholder="Add an approval comment..."
                    class="block w-full rounded-md border-gray-300 shadow-sm text-sm focus:border-green-500 focus:ring-green-500 px-3 py-2 border"
                ></textarea>
            </div>
            <div class="flex gap-2">
                <button
                    type="submit"
                    :disabled="submittingAction !== ''"
                    class="rounded-md bg-green-600 px-3 py-1.5 text-sm font-semibold text-white transition-colors"
                    :class="submittingAction !== '' ? 'cursor-not-allowed opacity-60' : 'hover:bg-green-500'"
                >
                    <span x-show="submittingAction !== 'approve'">Confirm Approve</span>
                    <span x-show="submittingAction === 'approve'">Approving...</span>
                </button>
                <button type="button" @click="showApprove = false" :disabled="submittingAction !== ''" class="rounded-md bg-white px-3 py-1.5 text-sm font-semibold text-gray-900 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 transition-colors" :class="submittingAction !== '' ? 'cursor-not-allowed opacity-60' : ''">
                    Cancel
                </button>
            </div>
        </form>
    </div>

    {# Reject comment panel #}
    <div x-show="showReject" x-transition class="mt-4 rounded-lg border border-red-200 bg-red-50 p-4">
        <h4 class="text-sm font-semibold text-red-800 mb-2">Confirm Rejection</h4>
        <form
            method="post"
            action="{% url 'orders:purchase-request-reject' purchase_request.pk %}"
            @submit="submittingAction = 'reject'"
        >
            {% csrf_token %}
            <div class="mb-3">
                <label class="block text-sm font-medium text-red-700 mb-1">Reason for rejection <span class="text-red-500">*</span></label>
                <textarea
                    name="comment"
                    rows="3"
                    required
                    placeholder="Please provide a reason for rejection..."
                    class="block w-full rounded-md border-gray-300 shadow-sm text-sm focus:border-red-500 focus:ring-red-500 px-3 py-2 border"
                ></textarea>
            </div>
            <div class="flex gap-2">
                <button
                    type="submit"
                    :disabled="submittingAction !== ''"
                    class="rounded-md bg-red-600 px-3 py-1.5 text-sm font-semibold text-white transition-colors"
                    :class="submittingAction !== '' ? 'cursor-not-allowed opacity-60' : 'hover:bg-red-500'"
                >
                    <span x-show="submittingAction !== 'reject'">Confirm Reject</span>
                    <span x-show="submittingAction === 'reject'">Rejecting...</span>
                </button>
                <button type="button" @click="showReject = false" :disabled="submittingAction !== ''" class="rounded-md bg-white px-3 py-1.5 text-sm font-semibold text-gray-900 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 transition-colors" :class="submittingAction !== '' ? 'cursor-not-allowed opacity-60' : ''">
                    Cancel
                </button>
            </div>
        </form>
    </div>

    <p
        x-show="submittingAction !== ''"
        class="mt-3 text-sm text-gray-500"
    >
        Submitting your decision...
    </p>

</div>
{% endif %}
